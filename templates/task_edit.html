{% extends "base.html" %}
{% block content %}

<section class="form-card">
    <h2>Изменить задачу</h2>
    <form action="/pages/tasks/{{ task.id }}/edit" method="post">
        <label for="title">Название задачи</label>
        <input id ="title" type="text" name="title" value="{{ task.title }}" required>
        <label class="checkbox-label">
            <input type="checkbox" name="is_done" value="true" {% if task.is_done %}checked{% endif %}>Задача выполнена
        </label>
        <button type="submit" class="button">Сохранить</button>
    </form>
</section>

{% endblock %}
